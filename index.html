<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Банк ошибок — сортировка по разделам</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #d32f2f;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #555;
            margin-bottom: 20px;
        }
        /* Кнопки категорий */
        .category-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .cat-btn {
            padding: 10px 24px;
            font-size: 16px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .cat-btn.active {
            background: #d32f2f;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .cat-btn:hover:not(.active) {
            background: #ccc;
        }
        /* Поисковая строка */
        .search-area {
            text-align: center;
            margin: 20px 0;
        }
        input {
            width: 60%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover {
            background: #b71c1c;
        }
        /* Результаты */
        .result {
            margin-top: 30px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .category-group {
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .category-group:last-child {
            border-bottom: none;
        }
        .category-title {
            font-size: 22px;
            font-weight: bold;
            color: #d32f2f;
            margin-bottom: 15px;
            padding-left: 8px;
            border-left: 5px solid #d32f2f;
        }
        .error-card {
            border-left: 4px solid #ff9800;
            background: #fef7e0;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: 0.1s;
        }
        .error-title {
            font-weight: bold;
            font-size: 17px;
            margin-bottom: 6px;
        }
        .error-solution {
            color: #333;
            font-size: 14px;
            line-height: 1.4;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #888;
        }
        .footer a {
            color: #d32f2f;
            text-decoration: none;
            border-bottom: 1px dashed #d32f2f;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .empty-message {
            text-align: center;
            color: #777;
            padding: 20px;
        }
        .empty-message a {
            color: #d32f2f;
            text-decoration: none;
            font-weight: bold;
        }
        .empty-message a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            input { width: 100%; margin-bottom: 10px; }
            button { margin-left: 0; width: 100%; }
            .category-bar { gap: 8px; }
            .cat-btn { padding: 6px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>

<h1>📚 Банк ошибок</h1>
<div class="sub">Выберите раздел → введите код или описание → получите решение</div>

<!-- Кнопки фильтрации по категориям -->
<div class="category-bar">
    <button class="cat-btn active" data-cat="all">📌 Все разделы</button>
    <button class="cat-btn" data-cat="Программирование">💻 Программирование</button>
    <button class="cat-btn" data-cat="Электронные приборы">🔌 Электронные приборы</button>
    <button class="cat-btn" data-cat="Другое">🧩 Другое</button>
</div>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="Пример: Python SyntaxError, Bosch E15, LG F21, 0x80070005 ...">
    <button onclick="searchError()">🔍 Найти</button>
</div>

<div id="result" class="result">
    <!-- Здесь появятся сгруппированные по разделам результаты -->
</div>

<div class="footer">
    База пополняется. Если не нашли ошибку — <a href="https://t.me/u_flexxx" target="_blank">напишите нам в Telegram</a>, и мы добавим.
</div>

<script>
    // ------------------- РАСШИРЕННАЯ БАЗА ОШИБОК С КАТЕГОРИЯМИ -------------------
    const errors = [
        // ----- ПРОГРАММИРОВАНИЕ -----
        {
            category: "Программирование",
            keywords: ["python", "syntaxerror", "invalid syntax", "синтаксическая ошибка"],
            title: "SyntaxError: invalid syntax (Python)",
            solution: "Проверьте все скобки, кавычки и двоеточия. Убедитесь, что вы не используете русские буквы в коде. Проверьте отступы."
        },
        {
            category: "Программирование",
            keywords: ["windows 11", "виндовс 11", "0x80070005", "ошибка 0x80070005"],
            title: "Ошибка 0x80070005 при обновлении Windows 11",
            solution: "Щелкните правой кнопкой мыши на файле/папке → Свойства → Безопасность → Изменить → добавьте свою учетную запись с полными правами."
        },
        {
            category: "Программирование",
            keywords: ["javascript", "referenceerror", "is not defined"],
            title: "ReferenceError: ... is not defined (JavaScript)",
            solution: "Переменная или функция не объявлена. Убедитесь, что вы определили её перед использованием. Проверьте область видимости (let, const, var)."
        },
        {
            category: "Программирование",
            keywords: ["java", "nullpointerexception", "null pointer"],
            title: "NullPointerException (Java)",
            solution: "Вы пытаетесь обратиться к методу или полю объекта, который равен null. Добавьте проверку if (object != null) перед вызовом."
        },
        
        // ----- ЭЛЕКТРОННЫЕ ПРИБОРЫ (бытовая техника) -----
        {
            category: "Электронные приборы",
            keywords: ["bosch", "e15", "посудомойка bosch", "e15 bosch"],
            title: "Ошибка E15 на посудомоечной машине Bosch",
            solution: "Сработала защита от протечек. Отключите питание, перекройте воду. Наклоните машину назад, чтобы слить воду из поддона. Вызовите мастера, если ошибка повторяется."
        },
        {
            category: "Электронные приборы",
            keywords: ["lg", "стиральная машина lg", "f21", "lg f21"],
            title: "Ошибка F21 на стиральной машине LG",
            solution: "Проблема со сливом воды. Очистите сливной фильтр (внизу справа). Проверьте сливной шланг и насос. Если не помогает — вызовите мастера."
        },
        {
            category: "Электронные приборы",
            keywords: ["samsung", "стиральная samsung", "5e", "ошибка 5e"],
            title: "Ошибка 5E на стиральной машине Samsung",
            solution: "Проблема с подачей воды. Проверьте, открыт ли кран, не пережат ли заливной шланг, чист ли фильтр залива воды."
        },
        {
            category: "Электронные приборы",
            keywords: ["indesit", "f05", "indesit f05"],
            title: "Ошибка F05 на стиральной машине Indesit",
            solution: "Не сливается вода. Очистите сливной фильтр и проверьте сливной насос. Возможно, засор в шланге."
        },
        
        // ----- ДРУГОЕ (общие, системные, принтеры и пр.) -----
        {
            category: "Другое",
            keywords: ["generic", "error", "problem", "неизвестная ошибка"],
            title: "Общая / неизвестная ошибка",
            solution: "Пожалуйста, уточните описание ошибки, код или устройство — это поможет точнее определить решение."
        },
        {
            category: "Другое",
            keywords: ["принтер", "epson", "ошибка принтера", "замятие бумаги"],
            title: "Замятие бумаги в принтере Epson / HP / Canon",
            solution: "Аккуратно извлеките застрявшую бумагу, потянув по направлению движения. Откройте все крышки, проверьте, нет ли обрывков. Перезагрузите принтер."
        },
        {
            category: "Другое",
            keywords: ["роутер", "wi-fi", "интернет", "нет соединения"],
            title: "Пропало подключение к Wi-Fi / интернету",
            solution: "Перезагрузите роутер и устройство. Проверьте, горит ли индикатор интернета. Если нет — свяжитесь с провайдером. Попробуйте забыть сеть и подключиться заново."
        }
    ];

    // Текущая выбранная категория (по умолчанию "all")
    let currentCategory = "all";

    // Элементы DOM
    const searchInput = document.getElementById("searchInput");
    const resultDiv = document.getElementById("result");

    // Навешиваем обработчики на кнопки категорий
    const catButtons = document.querySelectorAll(".cat-btn");
    catButtons.forEach(btn => {
        btn.addEventListener("click", () => {
            catButtons.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentCategory = btn.getAttribute("data-cat");
            searchError();
        });
    });

    // Функция поиска с учётом категории и группировкой
    function searchError() {
        let query = searchInput.value.toLowerCase().trim();
        
        // 1. Фильтрация по категории (если не "all")
        let filteredByCat = [];
        if (currentCategory === "all") {
            filteredByCat = [...errors];
        } else {
            filteredByCat = errors.filter(err => err.category === currentCategory);
        }

        // 2. Фильтрация по поисковому запросу (если есть)
        let filteredByQuery = [];
        if (query === "") {
            filteredByQuery = filteredByCat;
        } else {
            filteredByQuery = filteredByCat.filter(error => {
                return error.keywords.some(keyword => query.includes(keyword));
            });
        }

        // 3. Группировка по категориям
        const grouped = {
            "Программирование": [],
            "Электронные приборы": [],
            "Другое": []
        };
        
        filteredByQuery.forEach(error => {
            const cat = error.category;
            if (grouped[cat]) {
                grouped[cat].push(error);
            } else {
                if (!grouped["Другое"]) grouped["Другое"] = [];
                grouped["Другое"].push(error);
            }
        });

        // 4. Формируем HTML
        let html = "";
        const order = ["Программирование", "Электронные приборы", "Другое"];
        let hasAnyError = false;

        for (let cat of order) {
            const errorsInCat = grouped[cat];
            if (errorsInCat && errorsInCat.length > 0) {
                hasAnyError = true;
                html += `<div class="category-group">
                            <div class="category-title">📁 ${cat}</div>`;
                errorsInCat.forEach(error => {
                    html += `
                        <div class="error-card">
                            <div class="error-title">⚠️ ${error.title}</div>
                            <div class="error-solution">✅ Решение: ${error.solution}</div>
                        </div>
                    `;
                });
                html += `</div>`;
            }
        }

        if (!hasAnyError) {
            let categoryHint = "";
            if (currentCategory !== "all") {
                categoryHint = ` в разделе «${currentCategory}»`;
            }
            html = `<div class="empty-message">
                        😕 Ничего не найдено${categoryHint} по запросу «${query || "пустой запрос"}».<br>
                        Попробуйте ввести ключевые слова иначе (например, «Bosch E15», «Python ошибка», «LG F21»).<br>
                        Если вы уверены, что ошибка важна — <a href="https://t.me/u_flexxx" target="_blank">сообщите нам в Telegram</a>, мы добавим.
                    </div>`;
        }

        resultDiv.innerHTML = html;
    }

    // Поиск по нажатию Enter
    searchInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            searchError();
        }
    });

    // При загрузке страницы показываем все ошибки
    searchError();
</script>
</body>
</html>
